---
name: pull-request-basic-lint

# yamllint disable-line rule:truthy
on:
  pull_request:
    types: [ready_for_review]
    branches: [main]
  workflow_dispatch:

jobs:
  typos:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1.22.3
        with:
          config: ./.config/typos.toml

  yaml:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-yamllint@v1.14.0
        with:
          fail_on_error: true
          reporter: github-pr-review

  dotenv:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dotenv-linter/action-dotenv-linter@v2.21.0
        with:
          fail_on_error: true
          reporter: github-pr-review

  markdown:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.(md|MD)"
          # doesn't work if the name of the config doesn't start with dot
          config: "./.config/.markdownlint.yaml"

  commits-history:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: webiny/action-conventional-commits@v1.3.0
        with:
          allowed-commit-types: >
            build,chore,ci,deploy,docs,feat,fix,bugfix,perf,refactor,revert,style,test

  check-required:
    if: always()
    runs-on: ubuntu-22.04
    needs:
      - typos
      - yaml
      - markdown
      - commits-history
      - dotenv
    steps:
      - uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
